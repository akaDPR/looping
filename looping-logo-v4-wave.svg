<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#2dd4a8"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');</style>
  </defs>

  <g transform="translate(200, 66)">
    <!-- Letter "L" stylized as a broadcast tower with waves -->

    <!-- Central beacon / pin -->
    <circle cx="0" cy="2" r="10" fill="url(#wg1)" filter="url(#glow4)"/>
    <circle cx="0" cy="2" r="4.5" fill="white" opacity="0.95"/>

    <!-- Signal waves radiating outward -->
    <path d="M-16,-14 A22,22 0 0,1 16,-14" fill="none" stroke="url(#wg1)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow4)"/>
    <path d="M-26,-26 A36,36 0 0,1 26,-26" fill="none" stroke="url(#wg1)" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <path d="M-36,-36 A50,50 0 0,1 36,-36" fill="none" stroke="url(#wg2)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

    <!-- Downward waves (mirror) -->
    <path d="M-16,18 A22,22 0 0,0 16,18" fill="none" stroke="url(#wg1)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow4)"/>
    <path d="M-26,30 A36,36 0 0,0 26,30" fill="none" stroke="url(#wg1)" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <path d="M-36,40 A50,50 0 0,0 36,40" fill="none" stroke="url(#wg2)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

    <!-- Small orbiting device dots -->
    <circle cx="-30" cy="0" r="3" fill="#f472b6" opacity="0.85"/>
    <circle cx="30" cy="0" r="3" fill="#38bdf8" opacity="0.85"/>
    <circle cx="0" cy="-32" r="2.5" fill="#f59e42" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="150" font-family="'Outfit', sans-serif" font-weight="800" font-size="44" fill="#eeedf5" text-anchor="middle" letter-spacing="-2">looping</text>
  <text x="200" y="176" font-family="'Outfit', sans-serif" font-weight="500" font-size="11" fill="#8a86a0" text-anchor="middle" letter-spacing="4">CONNECT NEARBY</text>
</svg>