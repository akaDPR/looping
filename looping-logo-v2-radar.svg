<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#2dd4a8"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2dd4a8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');</style>
  </defs>

  <g transform="translate(200, 66)">
    <!-- Radar rings -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#252540" stroke-width="1"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#252540" stroke-width="1"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#252540" stroke-width="1.2"/>

    <!-- Broadcast arcs - top right -->
    <path d="M18,-18 A28,28 0 0,1 30,8" fill="none" stroke="url(#rg1)" stroke-width="3" stroke-linecap="round" filter="url(#glow2)"/>
    <path d="M28,-28 A42,42 0 0,1 44,10" fill="none" stroke="url(#rg1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Broadcast arcs - bottom left -->
    <path d="M-18,18 A28,28 0 0,1 -30,-8" fill="none" stroke="url(#rg2)" stroke-width="3" stroke-linecap="round" filter="url(#glow2)"/>
    <path d="M-28,28 A42,42 0 0,1 -44,-10" fill="none" stroke="url(#rg2)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="url(#rg1)" filter="url(#glow2)"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>

    <!-- Discovered device dots -->
    <circle cx="22" cy="-14" r="4" fill="#f472b6" opacity="0.9"/>
    <circle cx="-16" cy="22" r="3.5" fill="#38bdf8" opacity="0.9"/>
    <circle cx="32" cy="20" r="3" fill="#2dd4a8" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="148" font-family="'Outfit', sans-serif" font-weight="800" font-size="44" fill="#eeedf5" text-anchor="middle" letter-spacing="-2">looping</text>
  <text x="200" y="174" font-family="'Outfit', sans-serif" font-weight="500" font-size="11" fill="#8a86a0" text-anchor="middle" letter-spacing="4">CONNECT NEARBY</text>
</svg>