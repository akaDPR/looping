<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="50%" stop-color="#9d8ffa"/>
      <stop offset="100%" stop-color="#2dd4a8"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');</style>
  </defs>

  <!-- Background subtle circle -->
  <circle cx="200" cy="68" r="52" fill="none" stroke="#1e1e3a" stroke-width="1"/>

  <!-- Infinity loop - smooth figure-8 -->
  <g transform="translate(200, 68)" filter="url(#glow1)">
    <path d="M0,0 C0,-20 20,-28 30,-20 C40,-12 30,0 20,8 C10,16 -10,24 -20,16 C-30,8 -40,-12 -30,-20 C-20,-28 0,-20 0,0Z"
          fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Signal dots orbiting -->
    <circle cx="30" cy="-18" r="3.5" fill="#2dd4a8"/>
    <circle cx="-30" cy="14" r="3.5" fill="#7c6aef"/>
    <circle cx="0" cy="0" r="4" fill="#9d8ffa"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="148" font-family="'Outfit', sans-serif" font-weight="800" font-size="44" fill="#eeedf5" text-anchor="middle" letter-spacing="-2">looping</text>

  <!-- Tagline -->
  <text x="200" y="174" font-family="'Outfit', sans-serif" font-weight="500" font-size="11" fill="#8a86a0" text-anchor="middle" letter-spacing="4">CONNECT NEARBY</text>
</svg>